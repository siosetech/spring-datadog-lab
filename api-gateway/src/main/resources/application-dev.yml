spring:
  config:
    # optional: do not fail startup if secret/api-gateway is missing in local Vault
    import: optional:vault://
  cloud:
    vault:
      enabled: true
      uri: http://127.0.0.1:9200
      # Literal default: empty VAULT_TOKEN="" in IDE would otherwise override ${VAULT_TOKEN:root}
      token: ${SPRING_CLOUD_VAULT_TOKEN:root}
      fail-fast: false
      kv:
        enabled: true
        backend: secret
        default-context: ${spring.application.name}
        profiles: dev
