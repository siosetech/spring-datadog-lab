spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    vault:
      # Off unless a profile explicitly enables it (avoids TOKEN auth crash without config)
      enabled: false
    gateway:
      server:
        webflux:
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - ${GATEWAY_ALLOWED_ORIGIN:http://localhost:3000}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:http://localhost:9180}
              predicates:
                - Path=/api/v1/auth/**

            - id: user-profile-service
              uri: ${USER_PROFILE_SERVICE_URL:http://localhost:9082}
              predicates:
                - Path=/api/v1/profiles/**

            - id: audit-log-service
              uri: ${AUDIT_LOG_SERVICE_URL:http://localhost:9083}
              predicates:
                - Path=/api/v1/audit/**

            - id: dashboard-service
              uri: ${DASHBOARD_SERVICE_URL:http://localhost:9084}
              predicates:
                - Path=/api/v1/dashboard/**

server:
  port: ${SERVER_PORT:9000}
management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    vault:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
      env: dev
      service: ${spring.application.name}
      version: 1.0.0
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:9318/v1/metrics}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:9318/v1/traces}
    resource-attributes:
      deployment.environment: dev
      service.name: ${spring.application.name}
      service.version: 1.0.0
