fullnameOverride: auth-service
replicaCount: 1
image:
  repository: spring-datadog-lab/auth-service
  tag: 1.0.0-SNAPSHOT
service:
  port: 8080
env:
  SPRING_PROFILES_ACTIVE: "dev"
  SERVER_PORT: "8080"
  SPRING_CLOUD_VAULT_URI: "http://vault.spring-datadog-lab.svc.cluster.local:8200"
  SPRING_CLOUD_VAULT_TOKEN: "root"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-kafka-bootstrap:9092"
  DB_JDBC_URL: "jdbc:postgresql://postgresql:5432/auth_service"
  DB_USERNAME: "auth"
  DB_PASSWORD: "auth"
  USER_PROFILE_URL: "http://user-profile-service:8082"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"
envFrom: []
