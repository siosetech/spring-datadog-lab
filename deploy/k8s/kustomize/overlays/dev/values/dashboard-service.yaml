fullnameOverride: dashboard-service
replicaCount: 1
image:
  repository: spring-datadog-lab/dashboard-service
  tag: 1.0.0-SNAPSHOT
service:
  port: 8084
env:
  SPRING_PROFILES_ACTIVE: "dev"
  SERVER_PORT: "8084"
  SPRING_CLOUD_VAULT_URI: "http://vault.spring-datadog-lab.svc.cluster.local:8200"
  SPRING_CLOUD_VAULT_TOKEN: "root"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-kafka-bootstrap:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"
envFrom: []
