fullnameOverride: api-gateway
replicaCount: 1
image:
  repository: spring-datadog-lab/api-gateway
  tag: 1.0.0-SNAPSHOT
service:
  port: 9000
env:
  SPRING_PROFILES_ACTIVE: "dev"
  SERVER_PORT: "9000"
  SPRING_CLOUD_VAULT_URI: "http://vault.spring-datadog-lab.svc.cluster.local:8200"
  SPRING_CLOUD_VAULT_TOKEN: "root"
  AUTH_SERVICE_URL: "http://auth-service:8080"
  USER_PROFILE_SERVICE_URL: "http://user-profile-service:8082"
  AUDIT_LOG_SERVICE_URL: "http://audit-log-service:8083"
  DASHBOARD_SERVICE_URL: "http://dashboard-service:8084"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"
envFrom: []
