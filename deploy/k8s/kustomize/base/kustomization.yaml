apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  # HashiCorp Vault (dev mode for lab; apps use spring-cloud-vault)
  - name: vault
    repo: https://helm.releases.hashicorp.com
    version: 0.28.0
    releaseName: vault
    namespace: spring-datadog-lab
    includeCRDs: true
    valuesFile: vault-values.yaml

  # Strimzi Kafka Operator (0.51+ required for K8s 1.32+/emulationMajor)
  - name: strimzi-kafka-operator
    repo: https://strimzi.io/charts/
    version: 0.51.0
    releaseName: strimzi-cluster-operator
    namespace: spring-datadog-lab
    includeCRDs: true

  # Bitnami PostgreSQL
  - name: postgresql
    repo: https://charts.bitnami.com/bitnami
    version: 18.8.0
    releaseName: postgresql
    namespace: spring-datadog-lab
    valuesFile: postgresql-values.yaml
