# Default values for spring-microservice.
replicaCount: 1

image:
  repository: my-spring-app
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.0.0-SNAPSHOT"

service:
  type: ClusterIP
  port: 8080

env:
  SPRING_PROFILES_ACTIVE: "dev"
  # Lab: Spring Cloud Vault talks to Vault directly (no Vault Secrets Operator).
  SPRING_CLOUD_VAULT_URI: "http://vault.spring-datadog-lab.svc.cluster.local:8200"
  SPRING_CLOUD_VAULT_TOKEN: "root"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-kafka-bootstrap:9092"
  DB_JDBC_URL: "jdbc:postgresql://postgresql:5432/postgres"
envFrom: []

resources:
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    memory: 256Mi
    cpu: 250m

# Set per release so Service DNS is e.g. auth-service.spring-datadog-lab
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""
