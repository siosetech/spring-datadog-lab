server:
  # 9083 avoids FleetForge / Rancher Desktop on 8083
  port: ${SERVER_PORT:9083}
spring:
  application:
    name: audit-log-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    vault:
      enabled: false
  datasource:
    url: ${DB_JDBC_URL:jdbc:postgresql://localhost:9543/datadog_lab_db}
    username: ${DB_USERNAME:lab}
    password: ${DB_PASSWORD:lab}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  threads:
    virtual:
      enabled: true
  kafka:
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9192}
    consumer:
      group-id: audit-log-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "tech.sioseforge.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: tech.sioseforge.audit.event.UserRegisteredEvent

management:
  tracing:
    sampling:
      probability: 1.0
  health:
    vault:
      enabled: false
  metrics:
    tags:
      env: dev
      service: ${spring.application.name}
      version: 1.0.0
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:9318/v1/metrics}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:9318/v1/traces}
    resource-attributes:
      deployment.environment: dev
      service.name: ${spring.application.name}
      service.version: 1.0.0
