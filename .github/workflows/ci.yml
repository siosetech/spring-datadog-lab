name: CI - Build, Test, and Lint

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '.md'
      - 'docs/**'
      - 'terraform/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'terraform/**'

env:
  REGISTRY: ghcr.io
  JAVA_VERSION: '25'
  MAVEN_VERSION: '3.9'

jobs:
  build-and-test:
    name: Build, Test, and Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      issues: read
      checks: write
      pull-requests: write
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Dependency Review
        if: github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
        uses: actions/dependency-review-action@v4
      
      - name: Build with Maven
        run: mvn -B clean compile
      
      - name: Run Unit Tests
        run: mvn -B test
      
      - name: Run Integration Tests
        run: mvn -B verify

      - name: Security Scan (Trivy FS)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Docker Images (Spring Boot Buildpacks)
        run: mvn -B -DskipTests spring-boot:build-image '-Dspring-boot.build-image.imageName=${{ env.REGISTRY }}/${{ github.repository }}/${project.artifactId}:${{ github.sha }}' -Dspring-boot.build-image.publish=true
        continue-on-error: true  # Optional: skip if no Docker credentials
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/'
      
      - name: Publish Test Report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/target/surefire-reports/TEST-*.xml'
          check_name: Unit Test Results


