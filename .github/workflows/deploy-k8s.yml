name: Deploy to Kubernetes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  REGISTRY: ghcr.io
  JAVA_VERSION: '25'

jobs:
  build-and-deploy:
    name: Build Docker Images and Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Determine Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=dev-${{ github.sha }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push Docker Images
        run: |
          mvn -B clean spring-boot:build-image \
              -DskipTests \
              '-Dspring-boot.build-image.imageName=${{ env.REGISTRY }}/${{ github.repository }}/${project.artifactId}:${{ steps.version.outputs.version }}' \
              -Dspring-boot.build-image.publish=true
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'
      
      - name: Deploy with Helm + Kustomize
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          # Create kubeconfig
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG" | base64 -d > $HOME/.kube/config
          
          # Deploy with Helm (base, idempotent)
          helm upgrade --install spring-datadog-lab ./k8s/helm/spring-microservice \
            --namespace spring-datadog-lab \
            --create-namespace \
            --values ./k8s/helm/spring-microservice/values.yaml
          
          # Apply Kustomize overlay (dev/prod specific)
          kubectl apply -k ./k8s/kustomize/overlays/$ENVIRONMENT
          
          # Wait for rollout
          kubectl wait --for=condition=Available deployment --all -n spring-datadog-lab --timeout=5m
      
      - name: Verify Deployment
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG" | base64 -d > $HOME/.kube/config
          
          # Check service health
          kubectl get pods -n spring-datadog-lab
          kubectl get services -n spring-datadog-lab
      
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "K8s Deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Kubernetes Deployment*\nVersion: ${{ steps.version.outputs.version }}\nStatus: ${{ job.status }}\nEnvironment: ${{ github.event.inputs.environment || 'dev' }}"
                  }
                }
              ]
            }


